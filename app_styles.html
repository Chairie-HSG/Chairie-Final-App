<!--
    app_styles.html
    ─────────────────────────────────────────────────────────────
    This file controls the global design of the main Chairie app after the user has logged in.

    It is loaded into Streamlit with:
    st.markdown(..., unsafe_allow_html=True)

    Refreshed with the Chairie brand palette:
      #4A7C2D  forest green   → primary brand, CTAs, "free"
      #E30613  Swiss red      → "occupied", urgent warnings
      #F2C46D  warm honey     → secondary accent, "reserved", soft panels

    This file mainly styles:
    - the page background
    - the sidebar navigation (including collapse/expand controls)
    - the top bar (sticky at the top of the page)
    - the landing page (hero section + floor stat cards + KPI strip)
    - cards and statistics
    - the map page (toolbar, legend, seat detail panel)
    - buttons, alerts, selectboxes and Plotly charts
    - the support footer
    - live countdown timers and custom alert boxes

    It also includes a JavaScript block at the bottom that:
    - enables pinch-zoom on Plotly charts on mobile devices
    - ticks the live countdown timers every second
-->
<style>
  /* ─────────────────────────────────────────────────────────────
     FORCE LIGHT MODE
     Pinning color-scheme to light tells the browser to render form
     controls, scrollbars, and other native UI in light variants
     regardless of OS preference. Also overrides any dark-theme
     attribute Streamlit might set if a user toggles it manually.
     ───────────────────────────────────────────────────────────── */
  :root,
  html,
  body,
  [data-theme],
  [data-theme="dark"] {
    color-scheme: light !important;
  }

  /* Neutralise any prefers-color-scheme: dark rules from Streamlit's
     own stylesheet so the brand background always wins. */
  @media (prefers-color-scheme: dark) {
    html, body, .stApp, [data-testid="stAppViewContainer"] {
      background-color: var(--bg-page) !important;
      color: var(--text-strong) !important;
    }
  }

  :root { /*used to create global variables, meaning it applie these styles to the whole HTML document*/
    /* Global CSS variables.
    These variables store colors, shadows and border-radius values.
    We define the colors once here and reuse it later with var(...)
    */
    /* Brand palette (the three official colors) */
    --chairie-green:        #4A7C2D; /*Main green used for brand, buttons, free seats*/
    --chairie-green-hover:  #3d6724; /*Darker green used when hovering over green buttons*/
    --chairie-green-soft:   #e6efd9;   /* Light green background for soft highlights */

    --chairie-red:          #E30613; /*Red used for occupied seats and warnings*/
    --chairie-red-hover:    #b8050f; /*Darker red used on hover*/
    --chairie-red-soft:     #fde2e4; /*Light red background for warning-style elements*/

    --chairie-honey:        #F2C46D; /*Yellow used for reserved seats*/
    --chairie-honey-hover:  #e5b150; /* Darker yellow used on hover*/
    --chairie-honey-soft:   #fdf3dc; /*lighter yellow*/

    /* Seat Status colours (mapped to the brand palette) */
    --status-free:          var(--chairie-green);
    --status-reserved:      var(--chairie-honey);
    --status-occupied:      var(--chairie-red);
    --status-maintenance:   #9ca3af;

    /* Neutral background and text colors — warm off-white so the green/red pop */
    --bg-page:              #FBF8F1; /*Main app background*/
    --bg-card:              #ffffff; /*Card background*/
    --bg-subtle:            #f4f1e8; /*Soft beige background*/

    --border-soft:          #e8e3d5;
    --border-strong:        #d6cfbb;

    --text-primary:         #1f2937; /*Setting main text color*/
    --text-secondary:       #4b5563;
    --text-tertiary:        #9ca3af;

    /* Shadow styles for depth, 0 = horizontal offset, 1px = shadow moves 1 pixel downward, 2px = how blurry/soft the shadow is, rgba = color of the shadow */
    --shadow-xs:  0 1px 2px rgba(31, 41, 55, 0.04);
    --shadow-sm:  0 1px 3px rgba(31, 41, 55, 0.06), 0 1px 2px rgba(31, 41, 55, 0.04);
    --shadow-md:  0 4px 12px rgba(31, 41, 55, 0.07), 0 2px 4px rgba(31, 41, 55, 0.04);
    --shadow-lg:  0 10px 25px rgba(31, 41, 55, 0.08), 0 4px 10px rgba(31, 41, 55, 0.04);

    /* Shape */
    --radius-xs:  4px;
    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  14px;
    --radius-xl:  20px;
  }

  /* ────────────────────────────────────────────────────────────
     Page-level styling
     This controls the overall app background, font and default text color
     ────────────────────────────────────────────────────────────*/
  .stApp {
    background-color: var(--bg-page);
    background-image: /*adds decorative background graphics on top of background color*/
      radial-gradient(circle at 15% 0%, rgba(242, 196, 109, 0.10) 0%, transparent 50%),
      radial-gradient(circle at 85% 100%, rgba(74, 124, 45, 0.06) 0%, transparent 55%);
    background-attachment: fixed; /*keeps background fixed while scrolling*/
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
                 Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
  }

  /* Hide Streamlit's default menu and footer */
  #MainMenu       { visibility: hidden; }
  footer          { visibility: hidden; }

  /* ────────────────────────────────────────────────────────────
     MOBILE TOUCH BEHAVIOUR
     Let scrollable regions (page body, sidebar, etc) behave
     normally. Plotly charts manage their own touch handling
     internally — its drag layer (`.nsewdrag`) ships with
     `touch-action: none` so Plotly's JS can read raw touch
     events. We must NOT override that with `touch-action:
     pinch-zoom` or similar, or the browser steals the gesture
     before our JS pinch handler (added in the <script> block
     below) can see it.
     ────────────────────────────────────────────────────────────*/
  html,
  body,
  [data-testid="stAppViewContainer"],
  [data-testid="stMain"],
  [data-testid="stMainBlockContainer"] {
    touch-action: auto !important;
  }

  /* Keep Streamlit's header at its DEFAULT size and position.
     It gives the page a natural top inset, and (importantly) it's
     where the sidebar's expand chevron lives. Just blend its
     background into the page so it doesn't visually clash. */
  header[data-testid="stHeader"] {
    background: transparent !important; /*!important = forces this style to win over other styles*/
  }

  /* Defensive: force the sidebar's expand control to stay visible.
     Different Streamlit versions use different data-testid names. */
  [data-testid="stSidebarCollapsedControl"],
  [data-testid="collapsedControl"],
  button[kind="header"][data-testid="baseButton-header"] {
    display: flex !important;
    visibility: visible !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    z-index: 999 !important;
  }

  /* Limits the width of main content area on large screens.
     We leave the default top padding alone — Streamlit's header already supplies
     the visual top spacing, so adding more here just causes the
     "cropping" look. The 1rem top padding gives a small gap below
     Streamlit's own header so the chairie bar sits just under it. */
  [data-testid="stMainBlockContainer"],
  .main .block-container {
    max-width:        1400px;
    padding-top:      1rem !important;
    padding-bottom:   3rem;
  }

  /* The countdown JS lives in a components.v1.html iframe with
     height=0. The wrapper Streamlit puts around it can still have a
     visible margin — squash it so it doesn't add a gap. */
  iframe[title="streamlit_components.v1.html.html"][height="0"] {
    display: none !important;
  }
  .stElementContainer:has(> iframe[height="0"]),
  div[data-testid="stIFrame"]:has(iframe[height="0"]) {
    display: none !important;
    height: 0 !important;
    margin: 0 !important;
  }

  /* ────────────────────────────────────────────────────────────
     Sidebar navigation
     This styles Streamlit's sidebar and the navigation buttons inside it
     ────────────────────────────────────────────────────────────*/
  section[data-testid="stSidebar"] {
    background: linear-gradient(180deg, #ffffff 0%, var(--bg-subtle) 100%);
    border-right: 1px solid var(--border-soft);
  }
  section[data-testid="stSidebar"] .block-container {
    padding-top: 1.2rem;
  }

  /* ────────────────────────────────────────────────────────────
     SIDEBAR COLLAPSE / EXPAND CONTROLS
     Streamlit ships a built-in toggle but in some versions it's
     so subtle users don't notice it. Force it visible + branded.
     ────────────────────────────────────────────────────────────*/
  /* The "close" button shown inside the sidebar header when open. */
  [data-testid="stSidebarCollapseButton"],
  [data-testid="stSidebarCollapsedControl"],
  [data-testid="collapsedControl"] {
    opacity: 1 !important;
    visibility: visible !important;
    display: flex !important;
    align-items: center;
    justify-content: center;
  }
  /* Inside-sidebar close button: small green pill in the top-right. */
  [data-testid="stSidebarCollapseButton"] button,
  [data-testid="stSidebarCollapseButton"] {
    background: var(--chairie-green-soft) !important;
    color: var(--chairie-green) !important;
    border-radius: 8px !important;
    border: 1px solid var(--chairie-green-soft) !important;
    transition: background 0.15s ease;
  }
  [data-testid="stSidebarCollapseButton"] button:hover,
  [data-testid="stSidebarCollapseButton"]:hover {
    background: var(--chairie-green) !important;
    color: #ffffff !important;
    border-color: var(--chairie-green) !important;
  }
  /* The floating "open" chevron shown on the left edge when sidebar is
     collapsed. Make it a clearly visible green pill. */
  [data-testid="stSidebarCollapsedControl"],
  [data-testid="collapsedControl"] {
    background: var(--chairie-green) !important;
    color: #ffffff !important;
    border-radius: 0 10px 10px 0 !important;
    box-shadow: var(--shadow-md) !important;
    padding: 10px 8px !important;
    /* Default position — Streamlit places it for us now that the
       header is back in its normal flow. */
    left: 0 !important;
    z-index: 999 !important;
  }
  [data-testid="stSidebarCollapsedControl"] svg,
  [data-testid="collapsedControl"] svg,
  [data-testid="stSidebarCollapseButton"] svg {
    width: 18px;
    height: 18px;
  }

  .chairie-sidebar-brand {
    display: flex; /*flex means arrange elements next to eachother, centered, spaced evenly and vertically aligned*/
    align-items: center;
    gap: 12px; /*space between flex items*/
    padding: 4px 4px 22px 4px; /*padding order: top, right, bottom, left*/
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 18px;
  }
  .chairie-sidebar-brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--chairie-green);
    color: white;
    display: inline-flex; /*inline element (it can sit next to other elements) with flexbox "powers" (you can easily center what is inside)*/
    align-items: center;
    justify-content: center; /*aligns the element perfectly in the middle*/
    font-size: 18px;
    font-weight: 800;
    box-shadow: var(--shadow-sm);
  }
  .chairie-sidebar-brand-text { /*Places brand name and subtitle below eachother*/
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .chairie-sidebar-brand-name {
    font-size: 18px;
    font-weight: 800;
    color: var(--chairie-green);
    letter-spacing: -0.01em;
  }
  .chairie-sidebar-brand-sub { /*styles small subtitle below brand name*/
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .chairie-nav-label { /*styles small labels such as "Navigation" above sidebar buttons*/
    font-size: 10px;
    font-weight: 700;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 6px 4px 10px 4px; /*space outside the box*/
  }

  /* Style sidebar buttons so they look like navigation items */
  section[data-testid="stSidebar"] .stButton > button { /*selecting only buttons in the sidebar not all buttons in the whole app*/
    width: 100% !important;
    background: transparent !important;
    color: var(--text-secondary) !important;
    border: 1px solid transparent !important;
    border-radius: var(--radius-sm) !important;
    text-align: left !important;
    font-weight: 500 !important;
    padding: 10px 14px !important;
    margin-bottom: 4px !important;
    box-shadow: none !important;
    justify-content: flex-start !important; /*pushes the button content to the left*/
  }
  section[data-testid="stSidebar"] .stButton > button:hover { /*Applies when the mouse is over a sidebar button*/
    background: var(--chairie-green-soft) !important;
    color: var(--chairie-green) !important;
    border-color: transparent !important;
    box-shadow: none !important;
  }
  /* Styles the active navigation button — marked via type="primary" in the Python code */
  section[data-testid="stSidebar"] .stButton > button[kind="primary"] {
    background: var(--chairie-green) !important;
    color: #ffffff !important;
    border-color: var(--chairie-green) !important;
    box-shadow: var(--shadow-sm) !important;
  }
  section[data-testid="stSidebar"] .stButton > button[kind="primary"]:hover { /*darkents the active navigation button on hover*/
    background: var(--chairie-green-hover) !important;
    border-color: var(--chairie-green-hover) !important;
  }

  /* ────────────────────────────────────────────────────────────
     Top bar
     This styles the top navigation/header area shown after login
     (rendered on every post-login page)
     ────────────────────────────────────────────────────────────*/
  .chairie-topbar { /*This creates a white card-like top bar*/
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-xs);
    margin-bottom: 22px;
  }
  .chairie-topbar-left { /*Aligns the brand and page label horizontally*/
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .chairie-brand { /*Styles the Chairie brand name in the top bar*/
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    color: var(--chairie-green);
    letter-spacing: -0.01em;
  }
  .chairie-brand-mark { /*Styles the small brand icon in the top bar*/
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--chairie-green);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
  }
  .chairie-page-label { /*Styles the small page name next to the brand*/
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-left: 14px;
    border-left: 1px solid var(--border-soft);
  }

  /* Streamlit gives containers a class based on their key.
     This styles the container with key="chairie_topbar" as a card.
     STICKY: position: sticky + top pins the bar near the top
     of the viewport (with a small gap so it isn't visually cropped
     against the viewport edge) as the user scrolls. z-index keeps it
     above scrolling content; the solid background prevents bleed-through. */
  .st-key-chairie_topbar {
    position: sticky;
    /* Pin just below Streamlit's own header. Streamlit exposes
       --header-height in recent versions; fall back to 3.75rem
       (~60px, the typical header height) when the var is absent. */
    top: var(--header-height, 3.75rem);
    z-index: 100;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-xs);
    padding: 12px 22px;
    margin-bottom: 22px;
  }
  .st-key-chairie_topbar [data-testid="stHorizontalBlock"] {
    align-items: center;
  }

  /* The email + logout pair lives inside st.container(key="chairie_topbar_right"),
     which gives us the class ".st-key-chairie_topbar_right". */
  .st-key-chairie_topbar_right [data-testid="stHorizontalBlock"] {
    justify-content: flex-end;
    gap: 8px;
  }
  /* Styles the email button like a soft user pill (a soft chip with a green dot
     rather than a primary CTA) */
  .st-key-chairie_topbar_right .stButton > button { /*Selects button in the top-right area*/
    background: var(--bg-subtle) !important;
    color: var(--text-secondary) !important;
    border: 1px solid var(--border-soft) !important;
    border-radius: 999px !important;
    padding: 6px 14px 6px 26px !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    box-shadow: none !important;
    position: relative; /*button becomes reference box for the green dot that is placed inside the button*/
    height: auto !important; /*adjusting naturally to its content and padding*/
    white-space: nowrap; /*doesn't break email into multiple lines*/
    text-overflow: ellipsis; /*if email is too long, it gets shortened with ...*/
    overflow: hidden; /*hides the part of the email that doesn't fit inside the button*/
  }
  .st-key-chairie_topbar_right .stButton > button::before { /*adds small green status dot inside the email pill*/
    content: ""; /*creates a "fake" element*/
    position: absolute; /*let's us position the element manually*/
    left: 12px;
    top: 50%;
    transform: translateY(-50%); /*moves the dot upward by half of its own height*/
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--chairie-green);
  }
  .st-key-chairie_topbar_right .stButton > button:hover { /*Changes the email pill when hovered*/
    background: var(--chairie-green-soft) !important;
    color: var(--chairie-green) !important;
    border-color: var(--chairie-green-soft) !important;
  }
  /* The logout button is marked type="secondary" in Python,
     so we style the logout button in red */
  .st-key-chairie_topbar_right .stButton > button[kind="secondary"] {
    background: #ffffff !important;
    color: var(--chairie-red) !important;
    border: 1px solid var(--chairie-red) !important;
    border-radius: 999px !important;
    padding: 6px 16px !important;
    font-weight: 600 !important;
  }
  .st-key-chairie_topbar_right .stButton > button[kind="secondary"]:hover { /*making the button feel interactive, by filling it out red when mouse hovers over it*/
    background: var(--chairie-red) !important;
    color: #ffffff !important;
    border-color: var(--chairie-red) !important;
  }
  .st-key-chairie_topbar_right .stButton > button[kind="secondary"]::before {
    display: none; /*removing the green dot from the logout button, which we only want for the email button*/
  }

  /* ────────────────────────────────────────────────────────────
     Landing page ("hero section")
     This styles the large green introduction section on the landing page.
     ────────────────────────────────────────────────────────────*/
  .chairie-hero { /*creates the large green hero card*/
    position: relative;
    background: linear-gradient(135deg, var(--chairie-green) 0%, #3d6724 100%);
    border-radius: var(--radius-xl);
    padding: 44px 44px;
    margin-bottom: 26px;
    color: #ffffff;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  /* Adds decorative honey-colored blurry circle */
  .chairie-hero::after {
    content: "";
    position: absolute;
    right: -60px;
    top: -60px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: var(--chairie-honey);
    opacity: 0.35; /*opacity is how transparent something is*/
    filter: blur(20px);
    pointer-events: none; /*mouse should ignore this element*/
  }
  .chairie-hero::before { /*Adds decorative red blurry circle*/
    content: "";
    position: absolute;
    right: 60px;
    bottom: -80px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--chairie-red);
    opacity: 0.18;
    filter: blur(28px);
    pointer-events: none;
  }
  .chairie-hero-eyebrow { /*Styles small uppercase text above the slogan*/
    position: relative;
    z-index: 1; /*z-index to make the text appear in front of decorative circles*/
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--chairie-honey);
    margin-bottom: 12px;
  }
  .chairie-hero-slogan { /*styles the main large hero slogan*/
    position: relative;
    z-index: 1;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 12px;
    max-width: 720px;
  }
  .chairie-hero-sub { /*styles smaller description text under slogan*/
    position: relative;
    z-index: 1;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.88);
    max-width: 600px;
    line-height: 1.5;
    margin-bottom: 26px;
  }

  /* The hero CTA is a real Streamlit button hosted in
     st.container(key="chairie_hero_cta") — Streamlit wraps that
     container in a div with class "st-key-chairie_hero_cta", which
     lets us paint JUST that button in honey-yellow without leaking
     the style to every other button on the page. Also adds a bit of
     top/bottom breathing room so the CTA doesn't crash into the hero. */
  .st-key-chairie_hero_cta {
    margin-top: -10px;
    margin-bottom: 28px;
  }
  .st-key-chairie_hero_cta .stButton > button {
    background: var(--chairie-honey) !important;
    color: #1f2937 !important;
    border: 1px solid var(--chairie-honey) !important;
    border-radius: 999px !important;
    font-weight: 700 !important;
    font-size: 15px !important;
    padding: 12px 28px !important;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15) !important;
  }
  .st-key-chairie_hero_cta .stButton > button:hover {
    background: var(--chairie-honey-hover) !important;
    border-color: var(--chairie-honey-hover) !important;
    transform: translateY(-1px);
  }

  /* ────────────────────────────────────────────────────────────
     Landing page — stat cards (one per floor)
     These cards show the statistics for each floor
     ────────────────────────────────────────────────────────────*/
  .chairie-stat-card { /*Styles each floor statistics card*/
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 22px 22px;
    box-shadow: var(--shadow-sm);
    height: 100%;
    box-sizing: border-box;
    transition: transform 0.15s ease, box-shadow 0.15s ease; /*ensures smooth movement and transition when it moves*/
  }
  .chairie-stat-card:hover {
    transform: translateY(-2px); /*moves element 2 pixels upward*/
    box-shadow: var(--shadow-md);
  }
  .chairie-stat-card-header { /*styles top row inside the stat card*/
    display: flex; /*puts the items in the header next to each other horizontally*/
    justify-content: space-between;
    align-items: flex-start; /*aligns the items at the top of the row*/
    margin-bottom: 14px;
  }
  .chairie-stat-card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .chairie-stat-card-sub { /*styles the smaller subtitle under the title*/
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  /* Base Styles for Open / Busy / Full pill in the corner of each stat card */
  .chairie-availability-pill {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  /*different colors for different availability states*/
  .chairie-availability-pill.open  { background: var(--chairie-green-soft); color: var(--chairie-green); }
  .chairie-availability-pill.busy  { background: var(--chairie-honey-soft); color: #8a6320; }
  .chairie-availability-pill.full  { background: var(--chairie-red-soft); color: var(--chairie-red); }

  .chairie-stat-bignum { /*styles the large numbers inside a statistics card*/
    font-size: 36px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .chairie-stat-bignum-suffix { /*styles small text next to the large number*/
    font-size: 16px;
    font-weight: 500;
    color: var(--text-tertiary);
    margin-left: 4px;
  }
  .chairie-stat-bignum-label { /*Styles label below the large number*/

<!--
  Everything below the SCRIPT marker is JavaScript injected.
  It does two main things:
  1. Adds mobile pinch-zoom support for Plotly maps,
  so you can zoom out and into the map.
  2. Updates live countdown timers every second.

<script>
(function () {
  const parentWin = window.parent; /*get access to the parent streamlit window*/
  const doc       = parentWin.document; /*get access to the parent streamlit html documen*/

  // ─────────────────────────────────────────────────────────────
  // MOBILE PINCH-ZOOM ON PLOTLY CHARTS
  // ─────────────────────────────────────────────────────────────
  
   /**
    * Installs custom pinch-zoom behaviour for Plotly charts on mobile (mouse-wheel and two-finger)
    * */
  function installMobilePinchZoom() { /*only with mobile-sized screens*/
    if (parentWin.innerWidth > 768) return;
    if (parentWin.__chairiePinchInstalled) return;
    parentWin.__chairiePinchInstalled = true;

    let pinchState   = null;   // null when not pinching
    let pendingRAF   = null;
    let pendingRange = null;

    function distance(t0, t1) {
      return Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
    }

    // The drag layer is the invisible <rect class="nsewdrag"> Plotly
    // uses as the click/pan target. It's the most reliable proxy for
    // "the plot area's bounding box on screen".
    function getDragLayer(chartDiv) {
      return chartDiv.querySelector(".nsewdrag")
          || chartDiv.querySelector(".draglayer")
          || chartDiv;
    }

    // Resolve the Plotly module. react-plotly.js (which Streamlit
    // uses under the hood) doesn't always expose it on window, so we
    // probe a few places. If none works, the pinch handler falls
    // back to dispatching synthetic wheel events (see dispatchWheel).
    function getPlotly() {
      if (parentWin.Plotly && parentWin.Plotly.relayout) return parentWin.Plotly;
      if (parentWin.plotly && parentWin.plotly.relayout) return parentWin.plotly;
      return null;
    }

    // Fallback when we can't get a handle on Plotly.relayout directly.
    // Plotly registers a `wheel` listener on its drag layer when
    // scrollZoom is true; we feed it synthetic wheel events at the
    // pinch midpoint to drive the zoom. Less precise than relayout
    // (Plotly picks the zoom factor, not us) but works anywhere.
    function dispatchWheel(dragLayer, deltaY, clientX, clientY) {
      try {
        const evt = new WheelEvent("wheel", {
          bubbles: true, cancelable: true,
          deltaY: deltaY, deltaMode: 0,
          clientX: clientX, clientY: clientY,
          ctrlKey: false,
        });
        dragLayer.dispatchEvent(evt);
      } catch (_) { /* old browsers */ }
    }

    function onTouchStart(e) {
      if (e.touches.length !== 2) return;
      const target = e.target;
      if (!target || !target.closest) return;
      const chartDiv = target.closest(".js-plotly-plot");
      if (!chartDiv) return;
      // _fullLayout is Plotly's computed layout; we need it to know
      // current axis ranges. If the chart hasn't finished its first
      // render yet, bail out — the user can pinch again.
      if (!chartDiv._fullLayout || !chartDiv._fullLayout.xaxis || !chartDiv._fullLayout.yaxis) return;

      // Block Plotly from receiving the 2nd finger. With Plotly out
      // of the picture, the browser would normally try to scroll —
      // preventDefault stops that too.
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();

      const fl     = chartDiv._fullLayout;
      const initX  = fl.xaxis.range.slice();
      const initY  = fl.yaxis.range.slice();
      const drag   = getDragLayer(chartDiv);
      const rect   = drag.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      // Fractional position of the pinch center within the plot area
      // (0,0 = top-left, 1,1 = bottom-right).
      const fx = Math.max(0, Math.min(1, (midX - rect.left) / rect.width));
      const fy = Math.max(0, Math.min(1, (midY - rect.top)  / rect.height));

      // Convert that to data coordinates using Plotly's axis
      // conventions:
      //   x: range[0] at the LEFT, range[1] at the RIGHT
      //   y: range[0] at the BOTTOM, range[1] at the TOP (so even
      //      when y is inverted — e.g. [848, 0] for our top-down
      //      floor plan — the math still works out).
      const dataX = initX[0] + fx * (initX[1] - initX[0]);
      const dataY = initY[1] + fy * (initY[0] - initY[1]);

      pinchState = {
        chartDiv:  chartDiv,
        dragLayer: drag,
        initDist:  distance(e.touches[0], e.touches[1]),
        initX:     initX,
        initY:     initY,
        fx:        fx,
        fy:        fy,
        dataX:     dataX,
        dataY:     dataY,
        lastMidX:  midX,
        lastMidY:  midY,
        lastDist:  distance(e.touches[0], e.touches[1]),
      };

    }

      pendingRAF = null;
      if (!pendingRange || !pinchState) return;
      const Plotly = getPlotly();

          Plotly.relayout(pinchState.chartDiv, pendingRange);

        doc.body.setAttribute("data-chairie-pinch", "no-plotly");

      const newX0 = pinchState.dataX - pinchState.fx * spanX;

      const newY1 = pinchState.dataY - pinchState.fy * spanY;

        "xaxis.range": [newX0, newX1],

            pinchState.dragLayer,
            -distDelta * 4,
            (e.touches[0].clientX + e.touches[1].clientX) / 2,

      if (!pinchState) return;
      if (e.touches.length < 2) {
        pinchState = null;
        if (pendingRAF) {
          parentWin.cancelAnimationFrame(pendingRAF);
          pendingRAF = null;
        }
        pendingRange = null;
        if (doc.body) doc.body.setAttribute("data-chairie-pinch", "idle");
      }
    }

    // Capture-phase listeners on the parent doc fire BEFORE Plotly's
    // own bubble-phase listeners on the chart, which is what lets us
    // stopPropagation effectively. passive:false is required so
    // preventDefault works on touchstart/touchmove.
    doc.addEventListener("touchstart",  onTouchStart, { capture: true, passive: false });
    doc.addEventListener("touchmove",   onTouchMove,  { capture: true, passive: false });
    doc.addEventListener("touchend",    onTouchEnd,   { capture: true });
    doc.addEventListener("touchcancel", onTouchEnd,   { capture: true });

    if (doc.body) doc.body.setAttribute("data-chairie-pinch", "installed");
  }

  installMobilePinchZoom();

  // ─────────────────────────────────────────────────────────────
  // LIVE COUNTDOWN TICKER
  // ─────────────────────────────────────────────────────────────
  if (parentWin.__chairieCountdownInterval) { /*if old countdown interval exists from a previous Streamlit rerun, remove it*/
    clearInterval(parentWin.__chairieCountdownInterval);
  }
  /**Updates every countdown timer on the page.
   * It finds all elements with class "chairie-countdown"
   * reads their data-target timestamp, calculates the remaining time, 
   * and write the result as minutes:seconds
   * */
  function tick() {
    const els = doc.querySelectorAll(".chairie-countdown[data-target]"); /*this finds all countdown elements that have a target time*/
    const now = Date.now(); /*get the current time in milliseconds*/
    els.forEach(function (el) { /*update each countdown element*/
      const target = Date.parse(el.dataset.target);
      if (isNaN(target)) return;
      let secs = Math.max(0, Math.floor((target - now) / 1000)); /*this calculates seconds remaining, never going below 0*/
      const mm = String(Math.floor(secs / 60)).padStart(2, "0"); /*calculates remaining full minutes*/
      const ss = String(secs % 60).padStart(2, "0"); /*calculates remaining seconds*/
      el.textContent = mm + ":" + ss; /*writing the countdown text into the element*/
    });
  }
  tick(); /*run immediately so the timer appears without waiting one second*/
  parentWin.__chairieCountdownInterval = setInterval(tick, 1000); /*run countdown update every second*/
})();
</script>
